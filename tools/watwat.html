<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>watwat</title>
    <style>
      :root {
        color-scheme: light;
        background: #fbf8f4;
        color: #1f1b16;
        font: 14px/1.45 ui-monospace, SFMono-Regular, Consolas, monospace;
      }

      body {
        margin: 0;
        padding: 16px;
        background: #fbf8f4;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <pre id="tap">TAP version 13
1..0</pre>
    <script type="module">
      const testNamePattern = /^test_/;
      const output = document.getElementById("tap");

      class WatwatFailure extends Error {
        constructor(code) {
          super(`watwat failure ${code}`);
          this.name = "WatwatFailure";
          this.code = code;
        }
      }

      function hasGlobMeta(value) {
        return /[*?\[]/.test(value);
      }

      function tapEscape(value) {
        return String(value).replace(/[\\\n\r]/g, (match) => {
          if (match === "\\") {
            return "\\\\";
          }
          if (match === "\n") {
            return "\\n";
          }
          return "\\r";
        });
      }

      function resultPair(result) {
        if (Array.isArray(result)) {
          return result;
        }

        return [result, 0];
      }

      function memoryFor(instance, fallback) {
        return instance.exports.memory instanceof WebAssembly.Memory
          ? instance.exports.memory
          : fallback;
      }

      function decodeUtf8(memory, ptr, len) {
        if (!Number.isInteger(ptr) || !Number.isInteger(len) || ptr < 0 || len < 0) {
          return "";
        }

        const end = ptr + len;
        if (end < ptr || end > memory.buffer.byteLength) {
          return "";
        }

        return new TextDecoder().decode(new Uint8Array(memory.buffer, ptr, len));
      }

      function messageFor(instance, memory, code) {
        if (typeof instance.exports.message_for !== "function") {
          return `error code ${code}`;
        }

        try {
          const [ptr, len] = resultPair(instance.exports.message_for(code));
          const message = decodeUtf8(memory, ptr, len);
          return message || `error code ${code}`;
        } catch (error) {
          return `error code ${code}`;
        }
      }

      function testExports(instance) {
        return Object.entries(instance.exports)
          .filter(([name, value]) => testNamePattern.test(name) && typeof value === "function")
          .map(([name, value]) => [name, value]);
      }

      async function fetchBytes(url) {
        const response = await fetch(url);
        if (!response.ok) {
          const error = new Error(`${response.status} ${response.statusText}`.trim());
          error.code = response.status === 404 ? "ENOENT" : "EHTTP";
          throw error;
        }

        return response.arrayBuffer();
      }

      async function instantiateAssert(assertUrl, memory, watwat) {
        const bytes = await fetchBytes(assertUrl);
        const { instance } = await WebAssembly.instantiate(bytes, {
          env: { memory },
          watwat,
        });

        return instance.exports;
      }

      async function instantiateTestModule(file, assertUrl) {
        const memory = new WebAssembly.Memory({ initial: 1, maximum: 32768 });
        const watwat = {
          fail(code) {
            throw new WatwatFailure(code);
          },
        };
        const assert = await instantiateAssert(assertUrl, memory, watwat);
        Object.assign(watwat, assert);
        const bytes = await fetchBytes(file);
        const { instance } = await WebAssembly.instantiate(bytes, {
          env: { memory },
          watwat,
          assert,
        });

        return {
          instance,
          memory: memoryFor(instance, memory),
        };
      }

      async function runTestFile(file, testUrl, assertUrl) {
        const { instance, memory } = await instantiateTestModule(testUrl, assertUrl);
        const tests = testExports(instance);
        const results = [];

        for (const [name, test] of tests) {
          try {
            test();
            results.push({ ok: true, name });
          } catch (error) {
            const code = error instanceof WatwatFailure ? error.code : null;
            const message =
              code === null ? error.message || String(error) : messageFor(instance, memory, code);
            results.push({ ok: false, name, message });
          }
        }

        return results;
      }

      function testFilesFromLocation() {
        const params = new URLSearchParams(window.location.search);
        return params.getAll("test").flatMap((value) => value.split(",")).filter(Boolean);
      }

      async function main() {
        const files = testFilesFromLocation();
        const rootUrl = new URL("../", window.location.href);
        const assertUrl = new URL("dist/wasm/std/assert.wasm", rootUrl).href;
        const results = [];

        for (const file of files) {
          const testUrl = new URL(file, rootUrl).href;
          try {
            results.push(...(await runTestFile(file, testUrl, assertUrl)));
          } catch (error) {
            if (error.code === "ENOENT" && hasGlobMeta(file)) {
              continue;
            }

            results.push({
              ok: false,
              name: file,
              message: error.message || String(error),
            });
          }
        }

        const lines = ["TAP version 13", `1..${results.length}`];
        results.forEach((result, index) => {
          const number = index + 1;
          const name = tapEscape(result.name);

          if (result.ok) {
            lines.push(`ok ${number} - ${name}`);
            return;
          }

          lines.push(`not ok ${number} - ${name} # ${tapEscape(result.message)}`);
        });

        output.textContent = lines.join("\n");
      }

      main().catch((error) => {
        output.textContent = [
          "TAP version 13",
          "1..1",
          `not ok 1 - watwat.html # ${tapEscape(error.message || String(error))}`,
        ].join("\n");
      });
    </script>
  </body>
</html>
