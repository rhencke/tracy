name: CI

on:
  push:
    branches: [main, ci-gate-branch-protection]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wabt
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Build
        run: |
          if [ -f tools/build.sh ]; then bash tools/build.sh; fi

      - name: Run watwat tests
        run: |
          if [ -f tools/watwat.js ]; then node tools/watwat.js dist/wasm/*.test.wasm; fi
